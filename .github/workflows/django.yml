name: Journalise CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: "Journalise"
          POSTGRES_USER: "postgres"
          POSTGRES_PASSWORD: "Madfox123!"
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres" --health-interval=10s
          --health-timeout=5s --health-retries=5

    env:
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: "False"
      DB_NAME: "Journalise"
      DB_USER: "postgres"
      DB_PASSWORD: "Madfox123!"
      DB_HOST: localhost
      DB_PORT: 5432
      DJANGO_SETTINGS_MODULE: Journalise.settings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: python manage.py test
